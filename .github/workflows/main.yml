name: Actualizar Dash

on:
  schedule:
    # Se ejecuta 1 vez al día (12:00 PM UTC = 08:00 AM Santiago)
    - cron: '0 12 * * *' 
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar librerías necesarias
        run: |
          python -m pip install --upgrade pip
          pip install Pillow office365-rest-python-client

      - name: Ejecutar el script
        env:
          # Aquí lee las contraseñas ocultas de GitHub
          SP_USERNAME: ${{ secrets.SP_USERNAME }}
          SP_PASSWORD: ${{ secrets.SP_PASSWORD }}
        run: python main.py 

      - name: Publicar el HTML en GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
